# Hyprland configuration overrides
# Add your custom settings here

$laptop_scale = 1.25
$terminal = ghostty
# testing purposes set to true(default) 
# debug:disable_logs = false 


# Example overrides:
# ------------------------------------------------------
# Monitor (Monitor on the left)
# ------------------------------------------------------
monitor = eDP-1, preferred, auto, $laptop_scale
monitor = HDMI-A-1, preferred, auto-left, 1
monitor = DP-1, preferred, auto-left, 1
monitor = DP-2, preferred, auto-left, 1

# trigger when the switch is turning on
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# trigger when the switch is turning off
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, $laptop_scale"

# This is we want to forefully kill 
unbind = SUPER SHIFT, D
unbind = SUPER SHIFT CTRL, D
bind = SUPER SHIFT, D, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1.25" # keybind: Enable laptop display
bind = SUPER SHIFT CTRL, D, exec, hyprctl keyword monitor "eDP-1, disable" # keybind: Disable laptop display




# ------------------------------------------------------
# Input (caps=escape, natural_scroll, smooth movement)
# ------------------------------------------------------
input {
  kb_layout = dk
  kb_variant = nodeadkeys

  kb_options = caps:escape
  accel_profile = flat

  # Change speed of keyboard repeat
  repeat_rate = 50
  repeat_delay = 220

  touchpad {
    # Use natural (inverse) scrolling
    natural_scroll = true

    # Reduce accidental palm contact while typing
    disable_while_typing = true

    # Use native clickfinger handling for physical click areas
    clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 2
  }
}


# Disable my touch-screen have had problems with auto paste/click and deleting of window bcs of it
device {
    name = wacom-hid-5367-finger
    enabled = false
}
device {
    name = wacom-hid-5367-pen
    enabled = false
}
device {
    name = elan06fa:00-04f3:3293-touchpad
    enabled = true
}
cursor {
    no_hardware_cursors = false
}

# ------------------------------------------------------
# General Window Layout & Gaps
# ------------------------------------------------------
general {
# Space between windows
  gaps_in = 5

# Space between windows and the edge of the monitor (shrink this!)
    gaps_out = 10 

# Thickness of the window border
    border_size = 2 

# Optional: Colors for your borders to match your theme
    col.active_border = rgb(cba6f7)
    col.inactive_border = rgb(313244)
}
# ------------------------------------------------------
# Styling of apps
# ------------------------------------------------------
decoration {
  rounding = 10
}


# ------------------------------------------------------
# Change my 2.keyboard Alt-keys to nothing 
# ------------------------------------------------------
# Respectivelu: copy, paste, cut, undo, select all 
bind = ALT, c, exec, true
bind = ALT, v, exec, true
bind = ALT, x, exec, true
bind = ALT, z, exec, true
bind = ALT, a, exec, true 




# ------------------------------------------------------
# Shortcuts to my used apps
# ------------------------------------------------------
# Webapp
bindd = SUPER SHIFT, A, Gemini, exec, firefox "https://gemini.google.com/"
bindd = SUPER SHIFT CTRL, A, Gemini Code, exec, firefox "https://aistudio.google.com"
bindd = SUPER SHIFT, B, Firefox, exec, firefox "https://google.com"
bindd = SUPER SHIFT, K, Absalon, exec, firefox "https://absalon.ku.dk/"
bindd = SUPER SHIFT CTRL, K, KU, exec, firefox "https://kunet.ku.dk/"
bindd = SUPER SHIFT, E, Email, exec, firefox "https://webmail.simply.com"
bindd = SUPER SHIFT CTRL, E, KU Email, exec, firefox "https://webmail.ku.dk"
bindd = SUPER SHIFT, Y, YouTube, exec, firefox "https://youtube.com/"
bindd = SUPER SHIFT, D, Discord, exec, firefox "https://discord.com/channels/@me"


# Terminal & Files
bindd = SUPER, RETURN, Terminal, exec, $terminal
bindd = SUPER SHIFT, F, File manager, exec, nautilus --new-window

# Apps & Editors
bind = SUPER, B, exec, blueman-manager # keybind: Bluetooth
bindd = SUPER SHIFT, M, Music, exec, spotify
bindd = SUPER SHIFT, N, Editor, exec, $terminal -e nvim

# TUIs
bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER SHIFT CTRL, D, Docker, exec, $terminal -e lazydocker

# Close active window
bind = SUPER, W, killactive, # keybind: Close window
bind = SUPER SHIFT, W, exec, systemctl --user restart waybar.service # keybind: Restart Waybar

# Other
bind = SUPER, SPACE, exec, rofi -show drun # keybind: App launcher




# ------------------------------------------------------
# Move SUPER everywhere
# ------------------------------------------------------
# unbind SUPER (hjkl)
# unbind = SUPER, h
# unbind = SUPER, j
# unbind = SUPER, J
# unbind = SUPER, k
# unbind = SUPER, K
# unbind = SUPER, l

# Move focus with SUPER + hjkl
bind = SUPER, h, movefocus, l # keybind: Focus left
bind = SUPER, l, movefocus, r # keybind: Focus right
bind = SUPER, k, movefocus, u # keybind: Focus up
bind = SUPER, j, movefocus, d # keybind: Focus down




# ------------------------------------------------------
# Change default keybinds
# ------------------------------------------------------
# Switch workspaces with SUPER + [1-10]
bind = SUPER, 1, workspace, 1 # keybind: Workspace 1
bind = SUPER, 2, workspace, 2 # keybind: Workspace 2
bind = SUPER, 3, workspace, 3 # keybind: Workspace 3
bind = SUPER, 4, workspace, 4 # keybind: Workspace 4
bind = SUPER, 5, workspace, 5 # keybind: Workspace 5
bind = SUPER, 6, workspace, 6 # keybind: Workspace 6
bind = SUPER, 7, workspace, 7 # keybind: Workspace 7
bind = SUPER, 8, workspace, 8 # keybind: Workspace 8
bind = SUPER, 9, workspace, 9 # keybind: Workspace 9
bind = SUPER, 0, workspace, 10 # keybind: Workspace 10

# Move active window to a workspace with SUPER + SHIFT + [1-10]
bind = SUPER SHIFT, 1, movetoworkspace, 1 # keybind: Move to workspace 1
bind = SUPER SHIFT, 2, movetoworkspace, 2 # keybind: Move to workspace 2
bind = SUPER SHIFT, 3, movetoworkspace, 3 # keybind: Move to workspace 3
bind = SUPER SHIFT, 4, movetoworkspace, 4 # keybind: Move to workspace 4
bind = SUPER SHIFT, 5, movetoworkspace, 5 # keybind: Move to workspace 5
bind = SUPER SHIFT, 6, movetoworkspace, 6 # keybind: Move to workspace 6
bind = SUPER SHIFT, 7, movetoworkspace, 7 # keybind: Move to workspace 7
bind = SUPER SHIFT, 8, movetoworkspace, 8 # keybind: Move to workspace 8
bind = SUPER SHIFT, 9, movetoworkspace, 9 # keybind: Move to workspace 9
bind = SUPER SHIFT, 0, movetoworkspace, 0 # keybind: Move to workspace 10

# Reserve Workspace 1 for the external monitor
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:eDP-1, default:true


# Show custom keybind manual
unbind = SUPER, m
bind = SUPER, m, exec, /home/hjalte/.local/bin/custom-keybinds # keybind: Keybind manual

# Toggle Fullscreen for the active window
bind = SUPER, f, fullscreen # keybind: Fullscreen





# ------------------------------------------------------
# Fn-keys functionallity 
# ------------------------------------------------------
# Audio Volume Control (using SwayOSD)
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise # keybind: Volume up
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower # keybind: Volume down
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle # keybind: Mute volume

# Screen Brightness Control (using SwayOSD)
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise # keybind: Brightness up
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower # keybind: Brightness down

# Media Control
bindl  = , XF86AudioPlay, exec, playerctl play-pause # keybind: Play pause
bindl  = , XF86AudioNext, exec, playerctl next # keybind: Next track
bindl  = , XF86AudioPrev, exec, playerctl previous # keybind: Previous track

# Screenshots
# PrtSc: Vælg område -> Gem fil -> Kopiér fil til clipboard
bind = , Print, exec, mkdir -p "$HOME/Pictures/Screenshots" && filepath="$HOME/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png" && grim -g "$(slurp)" "$filepath" && wl-copy < "$filepath" && notify-send "Screenshot saved" "$filepath" # keybind: Area screenshot

# SHIFT + PrtSc: Hele skærmen -> Gem fil -> Kopiér fil til clipboard
bind = SHIFT, Print, exec, mkdir -p "$HOME/Pictures/Screenshots" && filepath="$HOME/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png" && grim "$filepath" && wl-copy < "$filepath" && notify-send "Screenshot saved" "$filepath" # keybind: Full screenshot

# ------------------------------------------------------
# (Add any other custom keybinds here or add as a group)
# ------------------------------------------------------

# Notifications
bind = SUPER, comma, exec, makoctl dismiss # keybind: Dismiss notification
bind = SUPER SHIFT, comma, exec, makoctl dismiss --all # keybind: Dismiss all notifications


exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE DISPLAY
exec-once = systemctl --user restart waybar.service
exec-once = mako
exec-once = swayosd-server




# ------------------------------------------------------
# animation instant from workspaces
# ------------------------------------------------------
animations {
    enabled = true

    # Keep default animations for windows, but make workspaces instant (0)
    animation = workspaces, 0
}

# ------------------------------------------------------
# Opacity Master Toggle 
# ------------------------------------------------------
bind = SUPER CTRL, t, exec, wlr-randr --output eDP-1 --toggle # keybind: Toggle laptop display



